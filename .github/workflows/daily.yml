name: daily commit

on:
  schedule:
    - cron: "0 8,14,20 * * *"

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: random daily commit
        run: |
          $RANDOM = Get-Random -Minimum 0 -Maximum 3
          if ($RANDOM -ne 0) { exit 0 }
          $messages = @("added today's entry", "daily log update", "end of day", "logging in", "quick update")
          $msg = $messages[(Get-Random -Maximum $messages.Length)]
          echo "## $(Get-Date -Format 'yyyy-MM-dd HH:mm') — $msg" | Out-File -Append -Encoding utf8 log.md
        shell: pwsh
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "$((Get-Random -InputObject @('daily','log','update','entry'))[0]) $(Get-Date -Format 'yyyy-MM-dd')"
