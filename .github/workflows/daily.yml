name: daily commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,14,20 * * *"

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: generate & commit
        shell: bash
        run: |
          # random skip — only 1 of 3 runs actually commits
          if [ $((RANDOM % 3)) -ne 0 ]; then exit 0; fi

          DATE=$(date '+%Y-%m-%d %H:%M')
          MSGS=("added today's entry" "daily log update" "end of day" "logging in" "quick update")
          MSG=${MSGS[$RANDOM % ${#MSGS[@]}]}

          QUOTES=(
            "\"The best way to predict the future is to invent it.\" — Alan Kay"
            "\"Any fool can write code that a computer can understand. Good programmers write code that humans can understand.\" — Martin Fowler"
            "\"First, solve the problem. Then, write the code.\" — John Johnson"
            "\"It's not a bug — it's an undocumented feature.\" — Unknown"
            "\"Talk is cheap. Show me the code.\" — Linus Torvalds"
            "\"The only way to learn a new programming language is by writing programs in it.\" — Dennis Ritchie"
            "\"Programming isn't about what you know; it's about what you can figure out.\" — Chris Pine"
            "\"The computer was born to solve problems that did not exist before.\" — Bill Gates"
          )
          QUOTE=${QUOTES[$RANDOM % ${#QUOTES[@]}]}

          JOKES=(
            "Why do programmers prefer dark mode? Because light attracts bugs."
            "How many programmers does it take to change a light bulb? None — that's a hardware problem."
            "Why do Java developers wear glasses? Because they can't C#."
            "There are only 10 types of people in the world: those who understand binary and those who don't."
            "A SQL query walks into a bar, walks up to two tables and asks: 'Can I join you?'"
            "Debugging: removing the parts of code that don't work. Also known as 'trying to delete the right lines'."
          )
          JOKE=${JOKES[$RANDOM % ${#JOKES[@]}]}

          FACTS=(
            "The first computer virus was created in 1983."
            "Python was named after Monty Python's Flying Circus."
            "The first programmer was Ada Lovelace (1840s)."
            "Git was created by Linus Torvalds in 2005."
            "The first website went live in 1991."
            "JavaScript was created in 10 days in 1995."
            "There are over 700 programming languages."
            "The first computer bug was a literal moth (1947)."
            "Linux runs on 90% of the world's supercomputers."
            "The @ symbol was used in email since 1971."
          )
          FACT=${FACTS[$RANDOM % ${#FACTS[@]}]}

          echo "" >> log.md
          echo "## $DATE — $MSG" >> log.md
          echo "" >> log.md
          echo "**Quote:** $QUOTE" >> log.md
          echo "" >> log.md
          echo "**Joke:** $JOKE" >> log.md
          echo "" >> log.md
          echo "**Fact:** $FACT" >> log.md
          echo "" >> log.md
          echo "---" >> log.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "daily update"
          git push
