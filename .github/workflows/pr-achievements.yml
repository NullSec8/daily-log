name: pr achievements

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of PRs to create"
        default: 20
        type: number
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: create and merge PRs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p logs

          for i in $(seq 1 ${{ inputs.count || 20 }}); do
            TS=$(date +%s)
            BRANCH="pr/$TS-$i"
            git checkout -b "$BRANCH"
            echo "Update $i at $(date)" > "logs/log-$TS-$i.txt"
            git add -A
            git commit -m "chore: update $i"
            git push origin "$BRANCH"

            gh pr create --base main --head "$BRANCH" --title "chore: update $i" --body "auto" --fill
            gh pr merge "$BRANCH" --merge --delete-branch

            git checkout main
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
